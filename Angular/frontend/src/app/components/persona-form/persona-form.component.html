<div class="card mt-4">
  <div class="card-header">
    <h3>{{ editMode ? 'Editar Persona' : 'Nueva Persona' }}</h3>
  </div>
  <div class="card-body">
    <form (ngSubmit)="savePersona()" #personaForm="ngForm">
      
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="Nombre" [(ngModel)]="persona.Nombre" required>
      </div>

      <div class="mb-3">
        <label for="apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="apellido" name="Apellido" [(ngModel)]="persona.Apellido" required>
      </div>

      <div class="mb-3">
        <label for="edad" class="form-label">Edad</label>
        <input type="number" class="form-control" id="edad" name="Edad" [(ngModel)]="persona.Edad" required>
      </div>

      <div class="mb-3">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="correo" name="Correo" [(ngModel)]="persona.Correo" required>
      </div>

      <!-- Campo de Selección de Vendedor -->
      <div class="mb-3">
        <label for="vendedor" class="form-label">Vendedor Asignado</label>
        <select class="form-select" id="vendedor" name="VendedorId" [(ngModel)]="persona.VendedorId">
          <option [ngValue]="null">— Sin vendedor —</option>
          <option *ngFor="let v of vendedores" [ngValue]="v.Id">{{ v.Nombre }}</option>
        </select>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn btn-success me-2" [disabled]="!personaForm.valid">Guardar</button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
      </div>

    </form>
  </div>
</div>
